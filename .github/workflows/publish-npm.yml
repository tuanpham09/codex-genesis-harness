name: Publish npm package

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: npm-publish-main
  cancel-in-progress: false

jobs:
  publish:
    name: Verify and publish to npm
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/

      - name: Configure npm auth
        run: |
          echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" > ~/.npmrc
          npm whoami
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify package
        run: |
          npm ci
          npm run verify
          npm run eval
          npm run pack:check

      - name: Derive publish version
        id: version
        shell: bash
        run: |
          base_version="$(node -p "require('./package.json').version")"
          publish_version="${base_version}-ci.${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}"

          npm pkg set "version=${publish_version}"

          echo "publish_version=${publish_version}" >> "$GITHUB_OUTPUT"

      - name: Check package name
        run: |
          node -p "require('./package.json').name"
          node -p "require('./package.json').version"

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm publish --access public --tag latest

      - name: Summary
        run: echo "Published codex-genesis-harness@${{ steps.version.outputs.publish_version }}"
